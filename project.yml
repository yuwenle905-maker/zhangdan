# XcodeGen project spec — 本地账单 (固定支出提醒看板, TrollStore 免签版)
# 生成命令: xcodegen generate --spec project.yml

name: 本地账单
options:
  bundleIdPrefix: com.yourname.zhangdan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  本地账单:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.yml"
          - ".github/**"
          - "README.md"
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: 本地账单
        CFBundleName: 本地账单
        CFBundleIdentifier: com.yourname.zhangdan
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSRequiresIPhoneOS: true
        NSFaceIDUsageDescription: 本地账单需要验证您的身份以保护账单隐私
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.zhangdan
        PRODUCT_NAME: 本地账单
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    entitlements:
      path: 本地账单.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yourname.zhangdan

schemes:
  本地账单:
    build:
      targets:
        本地账单: all
      buildImplicitDependencies: true
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
